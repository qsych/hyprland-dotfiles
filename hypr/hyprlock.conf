general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path =
    blur_passes = 1
    contrast = 0.8916
    brightness = 0.8172
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 96
    font_family = Noto Sans
    position = 0, 0
    halign = center
    valign = center
}

# Поле ввода (только точки под временем)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 0
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    fail_color = rgba(200, 50, 80, 0.5)
    check_color = rgba(50, 200, 80, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text =
    hide_input = false

    position = 0, -128
    halign = center
    valign = center
}
